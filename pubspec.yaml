name: nfc_pro_manager
description: A professional NFC library for Flutter. Supports Host Card Emulation (HCE), Card Cloning, NDEF Read/Write, and Smart Data Parsing with a premium native design system.
version: 1.0.6
homepage: https://github.com/Royhan2123/NFC-MANAGER
repository: https://github.com/Royhan2123/NFC-MANAGER
issue_tracker: https://github.com/Royhan2123/NFC-MANAGER/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.kotlin_nfc_manager
        pluginClass: NfcProPlugin
      ios:
        pluginClass: NfcProPlugin
